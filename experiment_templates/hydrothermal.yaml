id: hydrothermal
title: 水热/溶剂热合成
category: 合成
description: 水热或溶剂热法合成纳米材料、MOF、分子筛等的标准实验记录模板
tags:
- hydrothermal
- synthesis
- nano
content: <p><strong>实验目的：</strong>通过水热/溶剂热法合成【目标产物名称】，研究【变量，如温度/时间/前驱体比例】对产物【性能指标，如形貌/晶相/尺寸】的影响。</p><p><strong>材料与试剂：</strong></p><ul><li>前驱体1：【名称】，【用量】，纯度【填写】，厂家【填写】</li><li>前驱体2：【名称】，【用量】，纯度【填写】，厂家【填写】</li><li>溶剂：【名称，如水/乙醇/DMF】，用量【填写】mL</li><li>模板剂/表面活性剂：【名称】，用量【填写】</li></ul><p><strong>实验参数：</strong></p><ul><li>反应釜容积：【填写】mL，填充度：【填写】%</li><li>反应温度：【填写】°C</li><li>反应时间：【填写】小时</li><li>升温速率：【填写】°C/min</li><li>pH值：【填写】（如适用）</li></ul><p><strong>实验步骤：</strong></p><ol><li>称取前驱体，溶于溶剂中，搅拌【时间】至溶解/分散均匀</li><li>（可选）加入模板剂，继续搅拌【时间】</li><li>（可选）调节
  pH 至【值】</li><li>将溶液转移至反应釜内衬中</li><li>密封反应釜，放入烘箱，【温度】°C 反应【时间】小时</li><li>自然冷却至室温</li><li>离心/过滤收集产物，用【溶剂】洗涤【次数】次</li><li>在【温度】°C
  下干燥【时间】小时</li></ol><p><strong>产物表征计划：</strong>XRD / SEM / TEM / BET / 【其他】</p><p><strong>备注：</strong>【填写其他信息】</p>
