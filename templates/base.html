<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>Exdiary — {% block title %}实验记录{% endblock %}</title>
<link href="https://cdn.jsdelivr.net/npm/quill@2/dist/quill.snow.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/htmx.org@1/dist/htmx.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/quill@2/dist/quill.min.js"></script>
<link rel="stylesheet" href="/static/css/de-stijl.css">
<style>
/* Page-specific overrides */
{% block page_bg %}body { background-color: var(--white); }{% endblock %}
{% block topbar_style %}
.topbar { background: var(--white); }
.topbar-back { background: var(--black); color: var(--white); }
.topbar-back:hover { background: var(--white); color: var(--black); }
{% endblock %}
</style>
</head>
<body data-page="{% block page_id %}unknown{% endblock %}">

{% block topbar %}
<nav class="topbar" id="topbar">
  <div class="topbar-inner">
    <a href="/" class="topbar-back">&#x2190; Return</a>
  </div>
</nav>
{% endblock %}

{% block main_wrapper %}
<main class="container">
{% block content %}{% endblock %}
</main>
{% endblock %}

{% block footer %}
<footer class="bottom-bar">
  <span>Exdiary Labs</span>
  <span>System Online</span>
</footer>
{% endblock %}

<script src="/static/js/nav.js"></script>
<script>
// Global: render markdown content blocks
document.addEventListener('DOMContentLoaded', function() {
  document.querySelectorAll('.markdown-content').forEach(function(el) {
    if (el.dataset.rendered) return;
    el.innerHTML = marked.parse(el.textContent);
    el.dataset.rendered = '1';
  });
});

// Global: observe new content added by htmx
if (typeof htmx !== 'undefined') {
  htmx.on('htmx:afterSwap', function() {
    document.querySelectorAll('.markdown-content:not([data-rendered])').forEach(function(el) {
      el.innerHTML = marked.parse(el.textContent);
      el.dataset.rendered = '1';
    });
  });
}
</script>
</body>
</html>
