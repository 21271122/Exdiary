<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>Exdiary — {% block title %}实验记录{% endblock %}</title>
<link href="https://cdn.jsdelivr.net/npm/quill@2/dist/quill.snow.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/htmx.org@1/dist/htmx.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/quill@2/dist/quill.min.js"></script>
<style>
/* ============================================================
   DE STIJL DESIGN SYSTEM — Exdiary
   Palette: Red #E32636, Blue #1D54A6, Yellow #F8D030,
            White #FFF, Black #111, Off-white #f4f4f4
   ============================================================ */

:root {
  --red: #E32636;
  --blue: #1D54A6;
  --yellow: #F8D030;
  --white: #FFFFFF;
  --black: #111;
  --off-white: #f4f4f4;
  --border: 4px;
  --border-thick: 6px;
  --border-heavy: 12px;
  --shadow: 6px 6px 0px #111;
  --shadow-lg: 10px 10px 0px #111;
}

*, *::before, *::after { box-sizing: border-box; }

html { scrollbar-gutter: stable; }

body {
  font-family: 'Helvetica Neue', 'PingFang SC', 'Noto Sans SC', 'Microsoft YaHei', Arial, sans-serif;
  {% block page_bg %}background-color: var(--white);{% endblock %}
  color: var(--black);
  min-height: 100vh;
  margin: 0;
  padding-bottom: 32px;
  line-height: 1.6;
}

/* ---- Typography ---- */
h1, h2, h3 {
  font-weight: 900;
  text-transform: uppercase;
  letter-spacing: 2px;
  margin-top: 0;
}
h1 { font-size: 2rem; border-bottom: var(--border) solid var(--black); padding-bottom: 0.4em; }
h2 { font-size: 1.4rem; }
h3 { font-size: 1.1rem; letter-spacing: 1px; }

a { color: var(--black); }
a:hover { color: var(--blue); }

/* ---- Container ---- */
.container { max-width: 600px; margin: 0 auto; padding: 1.5rem 1rem; }

/* ---- Top bar (back button) ---- */
.topbar {
  position: sticky; top: 0; z-index: 900;
  padding: 0.4rem 1rem;
  border-bottom: var(--border) solid var(--black);
  display: flex;
  align-items: center;
}
.topbar-inner {
  width: 100%; max-width: 600px; margin: 0 auto;
  display: flex; align-items: center;
  padding-left: 0;
}
.topbar-back {
  display: inline-block;
  text-decoration: none;
  font-weight: 700;
  font-size: 0.8rem;
  letter-spacing: 1px;
  padding: 0.3rem 0.7rem;
  border: var(--border) solid var(--black);
  transition: all 0.15s;
  text-transform: uppercase;
}

/* ---- Bottom status bar ---- */
.bottom-bar {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--black); color: var(--white);
  padding: 4px 20px;
  font-weight: 700;
  font-size: 0.68rem;
  letter-spacing: 2px;
  text-transform: uppercase;
  display: flex; justify-content: space-between;
  z-index: 900;
}

/* ---- Cards ---- */
.card, .experiment-card {
  border: var(--border-thick) solid #d8e8f8;
  border-right-color: #c8ddf2;
  border-bottom-color: #b8d0eb;
  border-left-color: #a8c4e4;
  background: var(--white);
  box-shadow: 6px 6px 0px #b0b0b0;
  padding: 1rem 1.2rem;
  margin-bottom: 1rem;
  cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s;
}
.card:hover, .experiment-card:hover {
  transform: translate(-3px, -3px);
  box-shadow: 10px 10px 0px #bbb;
}

/* Pinned cards: light yellow border, gray shadow unchanged */
.pinned-card {
  border-top-color: #f8f0d0 !important;
  border-right-color: #f0e5b8 !important;
  border-bottom-color: #e8d8a0 !important;
  border-left-color: #e0cc88 !important;
}

/* ---- Selector & list items: subtle row tinting ---- */
.sel-item:nth-child(odd) { background: #fafafa; }
.sel-item:nth-child(even) { background: var(--white); }
.sel-item:hover { background: var(--yellow) !important; }

/* ---- Chat bubble paragraph normalization ---- */
.chat-bubble p { margin: 0.15em 0; }
.chat-bubble p:first-child { margin-top: 0; }
.chat-bubble p:last-child { margin-bottom: 0; }

/* ---- Buttons ---- */
button, .button, [role="button"], a[role="button"] {
  display: inline-block;
  font-family: inherit;
  font-weight: 700;
  font-size: 0.85rem;
  letter-spacing: 1px;
  text-transform: uppercase;
  text-decoration: none;
  padding: 0.5rem 1.2rem;
  cursor: pointer;
  border: var(--border) solid var(--black);
  background: var(--black);
  color: var(--white);
  transition: all 0.15s;
  text-align: center;
  line-height: 1.4;
}
button:hover, .button:hover, [role="button"]:hover, a[role="button"]:hover {
  background: var(--white);
  color: var(--black);
}
button:disabled, .button:disabled, [role="button"]:disabled {
  opacity: 0.4; cursor: not-allowed;
}

button.outline, .button.outline, [role="button"].outline, a[role="button"].outline {
  background: var(--white);
  color: var(--black);
}
button.outline:hover, a[role="button"].outline:hover {
  background: var(--black);
  color: var(--white);
}

button.secondary, .button.secondary, [role="button"].secondary {
  background: var(--off-white);
  color: var(--black);
  border-color: var(--black);
}
button.secondary:hover {
  background: var(--black);
  color: var(--white);
}

button.danger {
  background: var(--red);
  color: var(--white);
  border-color: var(--black);
}
button.danger:hover {
  background: var(--white);
  color: var(--red);
}

/* ---- Forms & Inputs ---- */
input[type="text"], input[type="search"], input[type="password"],
input[type="number"], input[type="date"], input[type="url"],
textarea, select {
  font-family: inherit;
  font-size: 0.9rem;
  padding: 0.5rem 0.7rem;
  border: var(--border) solid var(--black);
  background: var(--white);
  width: 100%;
  transition: border-color 0.15s;
  line-height: 1.5;
}
input:focus, textarea:focus, select:focus {
  outline: none;
  border-color: var(--blue);
}
textarea { resize: vertical; min-height: 3em; }
label { font-weight: 700; font-size: 0.85rem; display: block; margin-bottom: 0.3rem; }

input[type="checkbox"] {
  accent-color: var(--black);
  width: auto;
  margin-right: 0.3rem;
}

/* ---- Tables ---- */
table.academic-table {
  width: 100%;
  border-collapse: collapse;
  border-top: var(--border) solid var(--black);
  border-bottom: var(--border) solid var(--black);
  margin: 0.5rem 0;
}
table.academic-table thead { border-bottom: 2px solid var(--black); }
table.academic-table th {
  font-weight: 700; font-size: 0.78rem; letter-spacing: 1px;
  text-transform: uppercase; padding: 0.4rem 0.5rem; text-align: left;
  background: var(--off-white);
}
table.academic-table td {
  padding: 0.4rem 0.5rem; border: none; font-size: 0.85rem;
}
table.academic-table tbody tr { border: none; background: none; }
table.academic-table tbody tr:nth-child(2n) { background: none; }

/* ---- Status badges ---- */
.status-badge {
  display: inline-block;
  padding: 0.08em 0.45em;
  font-size: 0.72em;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  border: none;
}
.status-done    { background: #d4edda; color: #155724; }
.status-planned { background: #fff3cd; color: #856404; }
.status-running { background: #cce5ff; color: #004085; }
.status-failed  { background: #f8d7da; color: #721c24; }
.status-repeated{ background: #e2d9f3; color: #5a3d7a; }

/* ---- Tags ---- */
.tag-pill {
  display: inline-block;
  padding: 0.1em 0.45em;
  margin: 0.1em;
  font-size: 0.72em;
  font-weight: 600;
  background: var(--off-white);
  color: #666;
  border: 1px solid #ddd;
  border-radius: 2px;
}

/* ---- Flash messages ---- */
.flash {
  padding: 0.75rem; margin-bottom: 1rem;
  border: var(--border) solid var(--black);
}
.flash-error   { background: var(--red); color: var(--white); }
.flash-success { background: var(--white); color: var(--black); }

/* ---- Empty state ---- */
.empty-state {
  text-align: center; padding: 3rem 1rem;
  color: var(--black); opacity: 0.5;
}

/* ---- Section groups (details/summary) ---- */
.section-group { margin-bottom: 1.2rem; }
.section-group summary {
  font-weight: 700; font-size: 0.9rem; cursor: pointer;
  padding: 0.3em 0;
  text-transform: uppercase; letter-spacing: 1px;
  border-bottom: 2px solid var(--black);
}
.section-group summary:hover { color: var(--blue); }

/* ---- Status slider ---- */
.status-slider {
  display: flex; gap: 2px; overflow-x: auto; scroll-snap-type: x mandatory;
  padding: 3px 4px; max-width: 147px;
  border: var(--border) solid var(--black);
  -webkit-overflow-scrolling: touch; scrollbar-width: none;
}
.status-slider::-webkit-scrollbar { display: none; }
.status-slider .status-option {
  scroll-snap-align: center; flex-shrink: 0; padding: 2px 8px;
  font-size: 0.68em; font-weight: 700; cursor: pointer;
  border: none; white-space: nowrap; user-select: none;
  text-transform: uppercase; letter-spacing: 0.5px;
}
.status-slider .status-option[data-value="planned"]  { background: var(--yellow); color: var(--black); }
.status-slider .status-option[data-value="running"]  { background: var(--white); color: var(--black); }
.status-slider .status-option[data-value="done"]     { background: var(--blue); color: var(--white); }
.status-slider .status-option[data-value="failed"]   { background: var(--red); color: var(--white); }
.status-slider .status-option[data-value="repeated"] { background: var(--off-white); color: var(--black); }
.status-slider .status-option:hover { filter: brightness(0.9); }
.status-slider .status-option.selected { outline: 2px solid var(--black); outline-offset: -2px; }

/* ---- Modals ---- */
.edit-modal-overlay {
  display: none;
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.6); z-index: 1000;
  justify-content: center; align-items: center; padding: 1rem;
}
.edit-modal-overlay.active { display: flex; }
.edit-modal-box {
  background: var(--white); padding: 1.5rem;
  max-width: 580px; width: 92%; max-height: 85vh;
  border: var(--border-thick) solid var(--black);
  box-shadow: var(--shadow-lg);
  overflow-y: auto;
}
.edit-modal-label { font-weight: 700; margin-bottom: 0.5rem; font-size: 0.85rem; text-transform: uppercase; }
.edit-modal-input {
  width: 100%; padding: 0.6rem; font-size: 0.95rem;
  border: var(--border) solid var(--black); font-family: inherit;
  line-height: 1.6; resize: vertical; min-height: 3em;
}
.edit-modal-input:focus { border-color: var(--blue); outline: none; }
.edit-modal-actions { display: flex; gap: 0.5rem; justify-content: flex-end; margin-top: 1rem; }

.edit-modal-toolbar {
  display: flex; gap: 2px; margin-bottom: 0.5rem; padding: 5px 6px;
  background: var(--off-white); border: 2px solid var(--black);
  flex-wrap: wrap; align-items: center;
}
.edit-modal-toolbar button {
  width: 28px; height: 26px; border: 2px solid transparent;
  background: transparent; cursor: pointer;
  font-size: 0.8rem; font-weight: 700; color: var(--black);
  display: flex; align-items: center; justify-content: center;
}
.edit-modal-toolbar button:hover { background: var(--black); color: var(--white); }
.edit-modal-toolbar .tb-sep { width: 1px; height: 16px; background: var(--black); margin: 0 3px; }
.edit-modal-rich {
  width: 100%; padding: 0.6rem; font-size: 0.95rem;
  border: var(--border) solid var(--black); font-family: inherit;
  line-height: 1.6; min-height: 10em; max-height: 55vh;
  overflow-y: auto; outline: none; background: var(--white);
}
.edit-modal-rich:focus { border-color: var(--blue); }
.edit-modal-date {
  width: 100%; padding: 0.6rem; font-size: 0.95rem;
  border: var(--border) solid var(--black); font-family: inherit;
}

/* ---- Markdown content ---- */
.markdown-content h2 { margin-top: 1.5rem; border-bottom: 3px solid var(--black); padding-bottom: 0.3rem; }
.markdown-content table { width: 100%; }
.rich-notes {
  background: var(--off-white); padding: 1rem;
  border: var(--border) solid var(--black);
  line-height: 1.7;
}
.rich-notes img { max-width: 100%; }

/* ---- Quill overrides ---- */
.ql-editor {
  font-size: 0.95rem; line-height: 1.6; min-height: 200px;
}
.ql-toolbar.ql-snow {
  border: var(--border) solid var(--black) !important;
  border-bottom: none !important;
}
.ql-container.ql-snow {
  border: var(--border) solid var(--black) !important;
}

/* ---- Filter chips ---- */
.filter-chip {
  display: inline-block;
  padding: 0.15em 0.55em; margin: 0.15em;
  font-size: 0.72em; font-weight: 700;
  cursor: pointer;
  border: 2px solid var(--black);
  background: var(--white);
  color: var(--black);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  user-select: none;
  transition: all 0.12s;
}
.filter-chip.active { background: var(--black); color: var(--white); }
.filter-chip:hover { background: var(--black); color: var(--white); }

/* ---- Mark highlight ---- */
mark.highlight { background: var(--yellow); padding: 0 1px; }

/* ---- Responsive ---- */
{% block topbar_style %}
.topbar { background: var(--white); }
.topbar-back { background: var(--black); color: var(--white); }
.topbar-back:hover { background: var(--white); color: var(--black); }
{% endblock %}

@media (max-width: 576px) {
  .container { padding: 0.8rem 0.5rem; }
  h1 { font-size: 1.4rem; }
}
</style>
</head>
<body data-page="{% block page_id %}unknown{% endblock %}">

{% block topbar %}
<nav class="topbar" id="topbar">
  <div class="topbar-inner">
    <a href="/" class="topbar-back">&#x2190; Return</a>
  </div>
</nav>
{% endblock %}

{% block main_wrapper %}
<main class="container">
{% block content %}{% endblock %}
</main>
{% endblock %}

{% block footer %}
<footer class="bottom-bar">
  <span>Exdiary Labs</span>
  <span>System Online</span>
</footer>
{% endblock %}

<script>
// Global: render markdown content blocks
document.addEventListener('DOMContentLoaded', function() {
  document.querySelectorAll('.markdown-content').forEach(function(el) {
    if (el.dataset.rendered) return;
    el.innerHTML = marked.parse(el.textContent);
    el.dataset.rendered = '1';
  });
});

// Global: observe new content added by htmx
if (typeof htmx !== 'undefined') {
  htmx.on('htmx:afterSwap', function() {
    document.querySelectorAll('.markdown-content:not([data-rendered])').forEach(function(el) {
      el.innerHTML = marked.parse(el.textContent);
      el.dataset.rendered = '1';
    });
  });
}

// ===== Navigation history system (sessionStorage) =====
(function() {
  var STORAGE_KEY = 'exdiary_nav';
  var pageId = document.body.dataset.page || 'unknown';

  function loadNavData() {
    try {
      return JSON.parse(sessionStorage.getItem(STORAGE_KEY) || '{"history":[],"states":{},"isBack":false}');
    } catch(e) {
      return {history: [], states: {}, isBack: false};
    }
  }

  function saveNavData(data) {
    try {
      sessionStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    } catch(e) {}
  }

  var navData = loadNavData();

  var state = navData.states[pageId];
  if (state !== undefined && typeof window.restorePageState === 'function') {
    window.restorePageState(state);
  }
  if (navData.isBack) {
    navData.isBack = false;
    saveNavData(navData);
  }

  function isInternalNav(href) {
    if (!href || href === '#') return false;
    if (href.startsWith('http://') || href.startsWith('https://') || href.startsWith('//')) return false;
    if (href.startsWith('javascript:')) return false;
    if (href.startsWith('/api/')) {
      if (href === '/api/favorites' || href === '/api/list-collections') return true;
      return false;
    }
    if (href.startsWith('/uploads/')) return false;
    return true;
  }

  function navigateTo(url) {
    if (typeof window.savePageState === 'function') {
      var state = window.savePageState();
      if (state !== undefined) {
        navData.states[pageId] = state;
      }
    }

    if (navData.history.length > 0) {
      var lastEntry = navData.history[navData.history.length - 1];
      var lastParsed = new URL(lastEntry.url);
      var targetParsed = new URL(url, window.location.origin);
      if (lastParsed.pathname === targetParsed.pathname && lastParsed.search === targetParsed.search) {
        navData.history.pop();
        navData.isBack = true;
        saveNavData(navData);
        window.location.href = url;
        return;
      }
    }

    navData.history.push({page: pageId, url: window.location.href});
    navData.isBack = false;
    saveNavData(navData);
    window.location.href = url;
  }

  document.addEventListener('click', function(e) {
    if (e.target.closest('.edit-modal-overlay')) return;
    if (e.target.closest('.ql-toolbar') || e.target.closest('.ql-editor')) return;
    var link = e.target.closest('a');
    if (!link) return;
    var href = link.getAttribute('href');
    if (!isInternalNav(href)) return;
    if (link.getAttribute('target') === '_blank') return;
    if (link.hasAttribute('download')) return;
    e.preventDefault();
    navigateTo(href);
  });

  window.navigateToPage = function(url) {
    navigateTo(url);
  };
})();
</script>
</body>
</html>
