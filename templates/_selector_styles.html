<style>
/* ============================================================
   _selector_styles.html — De Stijl selector card styles
   ============================================================ */

.sel-card {
  border: 3px solid var(--black); overflow: hidden; background: var(--white); margin: 0.5rem 0;
}
.sel-card[data-status="cancelled"],
.sel-card[data-status="expired"] { opacity: 0.7; pointer-events: none; }

.sel-topbar {
  display: flex; justify-content: space-between; align-items: center;
  padding: 0.5rem 0.8rem; background: var(--off-white);
  border-bottom: 2px solid var(--black); font-weight: 700; font-size: 0.82rem; text-transform: uppercase; letter-spacing: 1px;
}
.sel-topbar button { font-size: 0.7rem; padding: 0.2rem 0.5rem; border: 2px solid var(--black); background: var(--white); cursor: pointer; font-weight: 700; }
.sel-topbar button:hover { background: var(--black); color: var(--white); }

.sel-body { max-height: 360px; overflow-y: auto; }
.sel-item {
  display: flex; align-items: flex-start; gap: 0.5rem;
  padding: 0.45rem 0.8rem; border-bottom: 1px solid var(--black);
  cursor: pointer; user-select: none;
}
.sel-item:hover { background: var(--off-white); }
.sel-item:last-child { border-bottom: none; }

.sel-item .sel-check {
  width: 20px; height: 20px; margin-top: 2px;
  border: 2px solid var(--black); flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700; color: transparent;
}
.sel-item .sel-check.checked { background: var(--black); color: var(--white); }

.sel-info { flex: 1; min-width: 0; }
.sel-info .si-id { font-weight: 700; font-family: 'Courier New', monospace; font-size: 0.8rem; }
.sel-info .si-title { font-size: 0.82rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin: 0.1rem 0; }
.sel-info .si-meta { font-size: 0.72rem; opacity: 0.5; font-weight: 600; }

.sel-more {
  display: block; width: 100%; padding: 0.5rem; text-align: center;
  font-size: 0.78rem; font-weight: 700;
  background: var(--off-white); border: none; border-top: 2px solid var(--black); cursor: pointer;
  text-transform: uppercase; letter-spacing: 1px;
}
.sel-more:hover { background: var(--black); color: var(--white); }

.sel-status-text { padding: 0.75rem 1rem; font-size: 0.85rem; font-weight: 700; }
.sel-status-text.confirmed { background: var(--off-white); }
.sel-status-text.cancelled { opacity: 0.5; }

.sel-modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.5);
  display: flex; align-items: center; justify-content: center; z-index: 1000;
}
.sel-modal {
  width: 90vw; max-width: 520px; max-height: 80vh;
  background: var(--white); border: 4px solid var(--black); overflow: hidden;
  display: flex; flex-direction: column; box-shadow: 10px 10px 0px #111;
}
.sel-modal-search { padding: 0.6rem 0.8rem; border-bottom: 2px solid var(--black); }
.sel-modal-search input {
  width: 100%; padding: 0.4rem 0.6rem; font-size: 0.85rem;
  border: 3px solid var(--black); outline: none; font-family: inherit;
}
.sel-modal-search input:focus { border-color: var(--blue); }
.sel-modal-list { flex: 1; overflow-y: auto; }
.sel-modal-bottombar {
  display: flex; justify-content: space-between; align-items: center;
  padding: 0.6rem 0.8rem; border-top: 2px solid var(--black); background: var(--off-white);
}
.sel-modal-bottombar .sel-count { font-size: 0.8rem; font-weight: 700; }
.sel-modal-bottombar .sel-actions { display: flex; gap: 0.5rem; }
.sel-modal-bottombar button {
  font-size: 0.75rem; padding: 0.3rem 0.7rem; cursor: pointer;
  border: 2px solid var(--black); font-weight: 700; text-transform: uppercase;
}
.sel-modal-bottombar button.sel-btn-cancel { background: var(--white); }
.sel-modal-bottombar button.sel-btn-cancel:hover { background: var(--off-white); }
.sel-modal-bottombar button.sel-btn-confirm { background: var(--black); color: var(--white); }
.sel-modal-bottombar button.sel-btn-confirm:hover { background: var(--white); color: var(--black); }

.sel-bottombar {
  display: flex; justify-content: space-between; align-items: center;
  padding: 0.5rem 0.8rem; border-top: 2px solid var(--black); background: var(--off-white);
}
.sel-bottombar .sel-count { font-size: 0.78rem; font-weight: 700; }
.sel-bottombar .sel-actions { display: flex; gap: 0.5rem; }
.sel-bottombar button {
  font-size: 0.75rem; padding: 0.3rem 0.7rem; cursor: pointer;
  border: 2px solid var(--black); font-weight: 700; text-transform: uppercase;
}
.sel-bottombar button.sel-btn-cancel { background: var(--white); }
.sel-bottombar button.sel-btn-cancel:hover { background: var(--off-white); }
.sel-bottombar button.sel-btn-confirm { background: var(--black); color: var(--white); }
.sel-bottombar button.sel-btn-confirm:hover { background: var(--white); color: var(--black); }

.analysis-summary-card {
  border: 3px solid var(--black); padding: 0.75rem 1rem; margin: 0.5rem 0; background: var(--off-white);
}
.analysis-summary-card .asc-title { font-weight: 700; font-size: 0.85rem; margin-bottom: 0.3rem; text-transform: uppercase; }
.analysis-summary-card .asc-excerpt {
  font-size: 0.8rem; opacity: 0.7; margin-bottom: 0.5rem;
  display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
}
.analysis-summary-card .asc-link { font-size: 0.75rem; font-weight: 700; color: var(--black); text-decoration: none; text-transform: uppercase; }

@media (max-width: 480px) {
  .sel-item { padding: 0.4rem 0.6rem; gap: 0.3rem; }
  .sel-item .sel-check { width: 18px; height: 18px; }
  .sel-info .si-id { font-size: 0.72rem; }
  .sel-info .si-title { font-size: 0.76rem; }
  .sel-info .si-meta { font-size: 0.68rem; }
  .sel-topbar, .sel-bottombar { padding: 0.4rem 0.6rem; }
  .sel-modal { width: 95vw; max-height: 90vh; }
}
</style>
